<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#090b1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="심야 병동" />
    <meta
      name="description"
      content="2~4명이 함께 새벽의 병동를 지키는 실시간 협동 디펜스 게임"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>심야 병동: 협동 방어</title>
    <style>
      html, body { margin: 0; background: #030507; }
      #orientation-lock { display: none; }
      @media (orientation: portrait) and (max-width: 900px) {
        #orientation-lock {
          position: fixed;
          inset: 0;
          z-index: 999;
          display: grid;
          place-items: center;
          color: #f4f6f6;
          background: #030507;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="orientation-lock" aria-live="polite">
      <div class="orientation-backdrop" aria-hidden="true"></div>
      <header class="orientation-brand"><i aria-hidden="true">☾</i><span>심야 병동</span></header>
      <section class="orientation-message">
        <small>LANDSCAPE REQUIRED</small>
        <div class="rotate-phone" aria-hidden="true"></div>
        <strong>화면을 가로로 돌려주세요</strong>
        <p>병동과 조작 버튼을 한 화면에서 볼 수 있습니다.</p>
      </section>
    </div>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
